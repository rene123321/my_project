// изначально: день 0 = bright, остальные pale
    let leafStatus = []; // [ветка][день]
    
    // задания для каждого дня и ветки (просто примеры)
    const taskDB = {
        "TRAINING": ["🏃 20 min cardio", "🧘 stretch 5 min", "💪 record reps"],
        "NUTRITION": ["🥦 eat veggies", "💧 2L water", "🍳 cook healthy meal"],
        "SLEEP": ["🌙 sleep before 23:30", "📵 no phone 1h before bed", "🕯️ dark room"]
    };
    
    let currentMode = "nocomp";
    let treeVisible = false;
    
    // инициализация матрицы
    function initLeafStatus() {
        let matrix = [];
        for (let i = 0; i < categories.length; i++) {
            let row = [];
            for (let d = 0; d < totalDays; d++) {
                if (d === 0) row.push("bright");
                else row.push("pale");
            }
            matrix.push(row);
        }
        return matrix;
    }
    
    // рендер дерева (листья)
    function renderTree() {
        const container = document.getElementById("branchesContainer");
        if (!container) return;
        container.innerHTML = "";
        
        for (let b = 0; b < categories.length; b++) {
            const branchDiv = document.createElement("div");
            branchDiv.className = "branch";
            
            const titleSpan = document.createElement("div");
            titleSpan.className = "branch-title";
            titleSpan.innerText = categories[b];
            branchDiv.appendChild(titleSpan);
            
            const clusterDiv = document.createElement("div");
            clusterDiv.className = "leaf-cluster";
            
            for (let day = 0; day < totalDays; day++) {
                const status = leafStatus[b][day];
                const leaf = document.createElement("div");
                leaf.className = leaf ${status};
                leaf.innerText = day + 1;
                
                // клик по листу
                leaf.addEventListener("click", (function(branchIdx, dayIdx, categoryName) {
                    return function() {
                        const currentStatus = leafStatus[branchIdx][dayIdx];
                        if (currentStatus === "bright") {
                            // открыть модалку с заданиями на сегодня
                            openTaskModal(branchIdx, dayIdx, categoryName);
                        } else if (currentStatus === "pale") {
                            alert("🌱 This leaf is still a bud. Complete today's task first!");
                        } else if (currentStatus === "dark") {
                            alert("✅ This day is already done! Good job.");
                        }
                    };
                })(b, day, categories[b]));
                
                clusterDiv.appendChild(leaf);
            }
            branchDiv.appendChild(clusterDiv);
            container.appendChild(branchDiv);
        }
    }
