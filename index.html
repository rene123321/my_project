    document.getElementById('blockerInput').placeholder = "Пример: стесняюсь говорить, мало практики";
    document.getElementById('resourcesInput').placeholder = "Пример: 1 час в день, знаю базу, есть друг-носитель";
    // генерируем начальные задания с дефолтными полями (не пустыми)
    currentGoal = "";
    currentBlocker = "";
    currentResources = "";
    latestTasks = generateTasks("достичь осознанного роста", "нерешительность и прокрастинация", "желание и окружение", "working");
    const tempClick = () => {
      showModalWithTasks(latestTasks);
    };
    renderTree(tempClick);
    // также обновляем обработчик при генерации, но показываем дерево-заставку
  })();
</script>
</body>
